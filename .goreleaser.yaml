# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: once
report_sizes: true
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
builds:
  - main: ./cmd/once
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      ## <<Stencil::Block(onceLdflags)>>
      - -X main.Version={{ .Version }}
      ## <</Stencil::Block>>
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
      ## <<Stencil::Block(onceExtraArch)>>

      ## <</Stencil::Block>>
    goos:
      - linux
      - darwin
      - windows
      ## <<Stencil::Block(onceExtraOS)>>

      ## <</Stencil::Block>>
    ignore:
      - goos: windows
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  use: git
release:
  gitea:
    owner: jaredallard
    name: once

  prerelease: "auto"
  footer: |-
    **Full Changelog**: https://git.rgst.io/jaredallard/once/compare/{{ .PreviousTag }}...{{ .Tag }}

gitea_urls:
  api: https://git.rgst.io/api/v1
  download: https://git.rgst.io

## <<Stencil::Block(extraReleaseOpts)>>

## <</Stencil::Block>>
